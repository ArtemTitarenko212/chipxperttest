<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests"> <!-- помогает с загрузкой картинок -->
    <title>ChipXpert — Чип-тюнинг Таллин</title>
    <meta name="description" content="Чип-тюнинг, диагностика, отключение AdBlue/EGR/DPF в Таллине">

    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #ff0000;
            --gray: #222;
            --border: #444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            font-size: 16px;
        }

        .container {
            padding: 0 16px;
            max-width: 100%;
        }

        /* Header + Burger */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.94);
            z-index: 100;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            max-height: 44px;
        }

        .burger {
            width: 32px;
            height: 24px;
            position: relative;
            cursor: pointer;
            z-index: 110;
        }

            .burger span,
            .burger span::before,
            .burger span::after {
                content: '';
                position: absolute;
                left: 0;
                width: 100%;
                height: 3px;
                background: #fff;
                border-radius: 2px;
                transition: all 0.3s ease;
            }

            .burger span {
                top: 10px;
            }

                .burger span::before {
                    top: -8px;
                }

                .burger span::after {
                    top: 8px;
                }

            .burger.active span {
                background: transparent;
            }

                .burger.active span::before {
                    transform: rotate(45deg);
                    top: 0;
                }

                .burger.active span::after {
                    transform: rotate(-45deg);
                    top: 0;
                }

        .mobile-menu {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.97);
            transform: translateX(-100%);
            transition: transform 0.35s ease;
            z-index: 105;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
            overflow-y: auto;
        }

            .mobile-menu.active {
                transform: translateX(0);
            }

            .mobile-menu ul {
                list-style: none;
                width: 100%;
                text-align: center;
                margin: 40px 0 50px;
            }

            .mobile-menu li {
                margin: 20px 0;
            }

            .mobile-menu a {
                color: white;
                font-size: 1.55rem;
                text-decoration: none;
                padding: 10px 0;
                display: block;
            }

                .mobile-menu a:hover {
                    color: var(--accent);
                }

            .mobile-menu .social-links {
                display: flex;
                gap: 22px;
                margin: 40px 0 30px;
            }

                .mobile-menu .social-links a {
                    width: 50px;
                    height: 50px;
                    background: white;
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }

                .mobile-menu .social-links svg {
                    width: 24px;
                    height: 24px;
                    fill: black;
                }

            .mobile-menu .lang-switch button {
                background: none;
                border: none;
                color: white;
                font-size: 1.4rem;
                padding: 8px 16px;
                cursor: pointer;
            }

                .mobile-menu .lang-switch button.active {
                    color: var(--accent);
                    font-weight: bold;
                }

        /* Hero */
        #hero {
            min-height: 65vh;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.55)), url('https://i.imgur.com/HngQX11.jpeg') center/cover no-repeat !important;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: scroll;
            display: flex;
            align-items: center;
            text-align: center;
            padding: 90px 16px 50px;
        }

            #hero h1 {
                font-size: 2.1rem;
                line-height: 1.15;
                margin-bottom: 12px;
            }

                #hero h1 span {
                    color: var(--accent);
                }

            #hero p {
                font-size: 1.25rem;
                margin-bottom: 24px;
            }

        .btn {
            display: block;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            padding: 16px;
            background: white;
            color: black;
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            text-align: center;
        }

            .btn:hover {
                background: var(--accent);
                color: white;
            }

        /* Общие секции */
        section {
            padding: 80px 0 60px;
        }

        h2 {
            text-align: center;
            font-size: 2.2rem;
            color: var(--accent);
            margin-bottom: 24px;
        }

        .about-text {
            font-size: 1.15rem;
            text-align: center;
            margin-bottom: 32px;
        }

        .gallery {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }

            .gallery img {
                width: 100%;
                height: 180px;
                object-fit: cover;
                border-radius: 10px;
            }

        /* Аккордеон */
        .accordion-header {
            background: var(--gray);
            padding: 16px 20px;
            font-size: 1.3rem;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .accordion-content {
            display: none;
            padding: 16px 20px;
            background: #111;
            border-radius: 0 0 8px 8px;
            font-size: 1.05rem;
        }

            .accordion-content.active {
                display: block;
            }

            .accordion-content ul {
                padding-left: 24px;
                list-style: disc;
            }

        /* Форма */
        form {
            display: grid;
            gap: 14px;
            margin-top: 20px;
        }

        input, textarea, button {
            padding: 14px 16px;
            font-size: 1.1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #111;
            color: white;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            background: white;
            color: black;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

            button:hover {
                background: var(--accent);
                color: white;
            }

        /* Карта */
        .map-container {
            margin-top: 30px;
            border-radius: 10px;
            overflow: hidden;
        }

            .map-container iframe {
                width: 100%;
                height: 280px;
                border: 0;
            }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 16px 30px;
            background: #111;
            font-size: 0.95rem;
        }

        .lang-ru, .lang-est {
            display: none;
        }

            .lang-ru.active, .lang-est.active {
                display: block;
            }
    </style>
</head>
<body>

        </div>
    </header>

    <!-- Остальной контент остаётся тем же, что был в предыдущей версии -->

    <section id="hero">
        <div class="container">
            <div class="lang-ru active">
                <h1>Профессиональный <span>чип-тюнинг</span> в Таллине</h1>
                <p>Диагностика и решение любых проблем</p>
            </div>
            <div class="lang-est">
                <h1>Professionaalne <span>chip-tuuning</span> Tallinnas</h1>
                <p>Diagnostika ja probleemide lahendamine</p>
            </div>
            <a href="#form" class="btn lang-ru active">Записаться онлайн</a>
            <a href="#form" class="btn lang-est">Online-broneerimine</a>
        </div>
    </section>

    <!-- ... все остальные секции (#about, #gallery, #services, #form, #contacts, footer) как в предыдущем сообщении ... -->

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const burger = document.getElementById('burger');
            const mobileMenu = document.getElementById('mobileMenu');

            if (burger && mobileMenu) {
                burger.addEventListener('click', function () {
                    burger.classList.toggle('active');
                    mobileMenu.classList.toggle('active');
                });

                document.querySelectorAll('.mobile-menu a').forEach(link => {
                    link.addEventListener('click', function () {
                        burger.classList.remove('active');
                        mobileMenu.classList.remove('active');
                    });
                });
            }

            document.querySelectorAll('.lang-switch button').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const lang = btn.dataset.lang;

                    document.querySelectorAll('.lang-ru, .lang-est').forEach(el => {
                        el.classList.toggle('active', el.classList.contains(`lang-${lang}`));
                    });

                    document.querySelectorAll('.accordion-item').forEach(item => {
                        const header = item.querySelector('.accordion-header');
                        const activeHeader = item.querySelector(`.lang-${lang}`);
                        if (activeHeader) header.textContent = activeHeader.textContent;
                    });
                });
            });

            document.querySelectorAll('.accordion-header').forEach(header => {
                header.addEventListener('click', function () {
                    const content = this.nextElementSibling;
                    content.classList.toggle('active');
                });
            });
        });
    </script>
</body>
</html>
